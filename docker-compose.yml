services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-haulsync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-haulsync_secret}
      POSTGRES_DB:       ${DB_NAME:-haulsync_ptl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-haulsync}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:       postgresql://${DB_USER:-haulsync}:${DB_PASSWORD:-haulsync_secret}@db:5432/${DB_NAME:-haulsync_ptl}
      JWT_SECRET:         ${JWT_SECRET:-change_me_in_production_32chars}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-7d}
      PORT:               5002
      NODE_ENV:           ${NODE_ENV:-production}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost:3002,http://localhost:5174}
      GPS_PROVIDER:       ${GPS_PROVIDER:-mock}
      GPS_API_KEY:        ${GPS_API_KEY:-}
      GPS_WEBHOOK_SECRET: ${GPS_WEBHOOK_SECRET:-}
      EWAY_CLIENT_ID:     ${EWAY_CLIENT_ID:-}
      EWAY_CLIENT_SECRET: ${EWAY_CLIENT_SECRET:-}
      EWAY_GSTIN:         ${EWAY_GSTIN:-}
      HAULSYNC_CORE_URL:      ${HAULSYNC_CORE_URL:-}
      HAULSYNC_CORE_API_KEY:  ${HAULSYNC_CORE_API_KEY:-}
    ports:
      - "5002:5002"
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "npx prisma migrate deploy && node prisma/seed.js && node server.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3002:80"

volumes:
  postgres_data:
  uploads_data:
